<!DOCTYPE html>
<html>
<head>
  <title>Video & Goodbye ❤️</title>
  <link rel="icon" type="img4.jpg" href="img4.jpg">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: cursive;
      color: white;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* CRT Video Frame */
    .crt-frame {
      position: relative;
      width: 90%;
      max-width: 800px;
      aspect-ratio: 16 / 9; /* keeps video ratio */
      border: 4px solid #00ff00;
      box-shadow: 0 0 20px #0f0, 0 0 40px #0f0 inset;
      border-radius: 15px;
      overflow: hidden;
      background: black;
      filter: contrast(1.2) brightness(1.1) saturate(1.2);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* no cropping */
      display: block;
    }

    /* Click overlay for sound */
    .overlay {
      position: absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      font-size:24px;
      font-weight:bold;
      color:#00ff00;
      background: rgba(0,0,0,0.6);
    }

    /* Goodbye message */
    #goodbyeMsg {
      margin-top: 30px;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px #fff, 0 0 20px #ff99cc, 0 0 30px #ff3333;
      display: none;
      animation: glowEffect 1s ease-in-out infinite alternate;
    }

    @keyframes glowEffect {
      0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff99cc, 0 0 20px #ff6666; }
      50% { text-shadow: 0 0 10px #fff, 0 0 20px #ff99cc, 0 0 30px #ff3333; }
      100% { text-shadow: 0 0 15px #fff, 0 0 30px #ff99cc, 0 0 45px #ff0000; }
    }
  </style>
</head>
<body>

  <h1>Watch This ❤️</h1>

  <div class="crt-frame">
    <video id="crtVideo">
      <source src="vedio.mp4" type="video/mp4">
      Your browser does not support video.
    </video>
    <div class="overlay" id="playOverlay">▶ Click ❤️ </div>
  </div>

  <p id="goodbyeMsg">Good Bye ❤️ Take Care!</p>

  <script>
    const video = document.getElementById("crtVideo");
    const overlay = document.getElementById("playOverlay");
    const goodbyeMsg = document.getElementById("goodbyeMsg");

    overlay.addEventListener("click", () => {
      video.play();                 // play video with sound
      overlay.style.display = "none"; // hide overlay
    });

    // Show goodbye message when video ends
    video.addEventListener("ended", () => {
      goodbyeMsg.style.display = "block";
    });
  </script>

</body>
</html>
