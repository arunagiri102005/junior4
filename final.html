<!DOCTYPE html>
<html>
<head>
  <title>Special For You ❤️</title>
<link rel="icon" type="img5.jpg" href="img5.jpg">
  <style>
    body {
      text-align: center;
      font-family: cursive;
      background: linear-gradient(to bottom, #ffcccc, #800000);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* Top Frame */
    .top-frame {
      position: relative;
      width: 90%;
      height: 300px;
      margin: 20px auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 10px black;
    }

    .top-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
    }

    .top-frame #text {
      position: absolute;
      top: 20px;
      left: 10px;
      right: 10px;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
      color: white;
    }

    .top-frame audio {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: calc(100% - 20px);
    }

    /* Second Message */
    #text2 {
      font-size: 20px;
      width: 90%;
      margin: 15px auto;
      line-height: 1.6;
      text-shadow: 2px 2px 5px black;
    }

    /* Bottom Frame (final message) */
    .bottom-frame {
      position: relative;
      width: 90%;
      min-height: 500px;  /* Increased height to merge middle image space */
      margin: 30px auto;
      border-radius: 15px;
      background: rgba(255, 102, 102, 0.8);
      box-shadow: 0 0 10px black;
      padding: 15px;
      overflow-y: auto; /* scroll if message is long */
      transition: height 0.3s ease;
    }

    #finalText {
      font-size: 22px;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
      color: white;
      line-height: 1.5;
      transition: font-size 0.5s ease, text-shadow 0.5s ease;
    }

    /* Glowing animation for final text */
    .glow {
      animation: glowEffect 1s ease-in-out infinite alternate;
    }

    @keyframes glowEffect {
      0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff99cc, 0 0 20px #ff6666; }
      50% { text-shadow: 0 0 10px #fff, 0 0 20px #ff99cc, 0 0 30px #ff3333; }
      100% { text-shadow: 0 0 15px #fff, 0 0 30px #ff99cc, 0 0 45px #ff0000; }
    }

    /* Next Button */
    .next-btn {
      margin: 20px auto;
      padding: 15px 30px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff6666, #ff0000);
      color: white;
      box-shadow: 2px 2px 8px black;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .next-btn:hover {
      transform: scale(1.1);
      box-shadow: 4px 4px 12px black;
    }
  </style>
</head>

<body>

  <h1>❤️For You❤️</h1>

  <!-- Top Frame -->
  <div class="top-frame">
    <img src="img.jpeg" alt="Top Image">
    <p id="text"></p>
    <audio controls autoplay>
      <source src="audio.mp3" type="audio/mpeg">
    </audio>
  </div>

  <!-- Second Message -->
  <p id="text2"></p>

  <!-- Bottom Frame (final message) -->
  <div class="bottom-frame">
    <p id="finalText"></p>
  </div>

  <!-- Next Button -->
  <button class="next-btn" onclick="goNextPage()">✋🏻HIFI</button>

  <script>
    let msg1 = "Hey... unakaga dhaan indha message ❤️ Unna enaku romba pudikkum pa...";
    let msg2 = "Indha song unakaga nana ezhuthuna nana paadanum ninacha but enoda voice unna vitta yaaru kepa neeya sollu seri ok pa keela oru msg ah iruku please ignore pannama padichirupa...";
    let msg3 = "Once again Happy Birthday junior 🥳 intha birthday plan la pota vecha papu aana enna ennamo nadanthuruchi unaku intha birthday ku Ai project gift ah thara sonna ennala mudila  then oru permanent person ah kuda iruka mudila mah unoda love romba unique pa but enaku tha kuduthu vekkala miss pannita ippa vara regret pandra yellathukum sorry papu 😔 unoda birthday ku ennala nerla kuda wish panna mudila romba kastam ah iruku mah innum 3 month la clg over apro unna paakava mudiyathu ninaikurapa innum kastam ah iruku Na niraya muttal thanam panna mah aana athu yella nee Venum mattum tha panna anyway happy ah iru epama safe ah iru odambu paathuko nalla sapudanum seriya unakaga epama na irupa junior nee 1 second kuda unaku yaarum illa ninachiratha I am always be with you junior🫂❤️ I really miss you junior 🥺🫂nee enkuda iruntha oru oru seconds na romba lucky ah feel panna mah thanks for everything papu unaku ethachi sollanum na yosikama yaaru kittayum discuss kuda pannatha oru missed call illa msg pannu papu enga irunthalum na unkita vanthuruva then clg mudichitu pora papu mudinja oru last outing madam ok na vaanga pesalam Athuku melayum vena na unoda istam papu I love you as always papumah ❤️";

    let i = 0, j = 0, k = 0;
    const finalFrame = document.getElementById("finalText");
    const bottomFrame = document.querySelector(".bottom-frame");

    function typeFirst() {
      if (i < msg1.length) {
        document.getElementById("text").innerHTML += msg1.charAt(i);
        i++;
        setTimeout(typeFirst, 40);
      } else {
        setTimeout(typeSecond, 500);
      }
    }

    function typeSecond() {
      if (j < msg2.length) {
        document.getElementById("text2").innerHTML += msg2.charAt(j);
        j++;
        setTimeout(typeSecond, 40);
      } else {
        setTimeout(typeFinal, 500);
      }
    }

    function typeFinal() {
      if (k < msg3.length) {
        finalFrame.innerHTML += msg3.charAt(k);
        k++;
        bottomFrame.style.height = finalFrame.scrollHeight + 30 + "px";

        if (k === msg3.length) {
          finalFrame.style.fontSize = "28px";
          finalFrame.classList.add("glow");
        }

        setTimeout(typeFinal, 35);

    typeFirst();

    function goNextPage() {
      window.location.href = "goodbye.html"; 
    }
  </script>

</body>
</html>
