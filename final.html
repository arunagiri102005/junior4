<!DOCTYPE html>
<html>
<head>
  <title>Special For You ❤️</title>
<link rel="icon" type="img5.jpg" href="img5.jpg">
  <style>
    body {
      text-align: center;
      font-family: cursive;
      background: linear-gradient(to bottom, #ffcccc, #800000);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* Top Frame */
    .top-frame {
      position: relative;
      width: 90%;
      height: 300px;
      margin: 20px auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 10px black;
    }

    .top-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
    }

    .top-frame #text {
      position: absolute;
      top: 20px;
      left: 10px;
      right: 10px;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
      color: white;
    }

    .top-frame audio {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: calc(100% - 20px);
    }

    /* Second Message */
    #text2 {
      font-size: 20px;
      width: 90%;
      margin: 15px auto;
      line-height: 1.6;
      text-shadow: 2px 2px 5px black;
    }

    /* Bottom Frame (final message) */
    .bottom-frame {
      position: relative;
      width: 90%;
      min-height: 500px;  /* Increased height to merge middle image space */
      margin: 30px auto;
      border-radius: 15px;
      background: rgba(255, 102, 102, 0.8);
      box-shadow: 0 0 10px black;
      padding: 15px;
      overflow-y: auto; /* scroll if message is long */
      transition: height 0.3s ease;
    }

    #finalText {
      font-size: 22px;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
      color: white;
      line-height: 1.5;
      transition: font-size 0.5s ease, text-shadow 0.5s ease;
    }

    /* Glowing animation for final text */
    .glow {
      animation: glowEffect 1s ease-in-out infinite alternate;
    }

    @keyframes glowEffect {
      0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff99cc, 0 0 20px #ff6666; }
      50% { text-shadow: 0 0 10px #fff, 0 0 20px #ff99cc, 0 0 30px #ff3333; }
      100% { text-shadow: 0 0 15px #fff, 0 0 30px #ff99cc, 0 0 45px #ff0000; }
    }

    /* Next Button */
    .next-btn {
      margin: 20px auto;
      padding: 15px 30px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff6666, #ff0000);
      color: white;
      box-shadow: 2px 2px 8px black;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .next-btn:hover {
      transform: scale(1.1);
      box-shadow: 4px 4px 12px black;
    }
  </style>
</head>

<body>

  <h1>❤️For You❤️</h1>

  <!-- Top Frame -->
  <div class="top-frame">
    <img src="img7.jpeg" alt="Top Image">
    <p id="text"></p>
    <audio controls autoplay>
      <source src="audio.mp3" type="audio/mpeg">
    </audio>
  </div>

  <!-- Second Message -->
  <p id="text2"></p>

  <!-- Bottom Frame (final message) -->
  <div class="bottom-frame">
    <p id="finalText"></p>
  </div>

  <!-- Next Button -->
  <button class="next-btn" onclick="goNextPage()">✋🏻 Next</button>

  <script>
    let msg1 = "Hey... unakaga dhaan indha message ❤️ Unna enaku romba pudikkum pa...";
    let msg2 = "Indha song unakaga nana ezhuthuna nana paadanum ninacha but enoda voice unna vitta yaaru kepa neeya sollu seri ok pa keela oru msg ah iruku please ignore pannama padichirupa...";
    let msg3 = "first once again Happy Birthday junior unoda intha birthday unoda life la maraka mudiyatha maari irukanum ninachapa aana enna ennamo nadanthuruchi ai project sonna but ennala atha ready panna mudila then ennala oru permanent person ah kuda iruka mdila mah unna romba hurt pannitapa yellathukum sorry unoda love romba unique pa enaku tha kuduthu vekkala na athuku worth illa pola nee ennaku easy ah kedachita solli romba sandhosham paduva papu aana ippa miss pannita ippa vara regret pandra  na promise namba love piriyum ninaikala mah  ippa sollura papu unique love la na unaku panniruka na sethuta mattum tha unna vittu povenu nee enaku kedacha god gift junior unakaga evalo vena kasatam padalam wait pannala avalo worth enoda junior misunderstanding la oru love piriya koodathupa enna aanalum maathitu onna irukanum na maaritapa atha epdi prove pannanum therila innum 3 month la clg vittu poiduva apro unna paakava mudiyathu ninaikurapa kastam ah iruku nee venum sollitu niraya muttal thanam pannapa aana athu unna innum hurt panniruchi aana yellama ne venum mattum tha pa panna anyway happy iru safe ah iru yaarayum namba koodathu seriya odambu paathuko nalla sapudanum then vera enna sollurathu therilapa unaku onnuna nee kooputa na epama varuva enoda papu kaga  nov 10 panna challenge la nee jeichitala na challenge panna yaaru kittayum out aaga maata expect u because epama enoda ramya jeipa la ippayum jeichita ava sonna maariya senjita intha msg unkita epa annupuva therilapa bayam ah iruku nalaiku vera birthday la aana itha unkita tharapa unaku ethachi yen kitta sollanum na yosikama oru call illa msg pannupa thanks for everything papu  i love u as always my junior❤️ and i really miss you junior🫂";

    let i = 0, j = 0, k = 0;
    const finalFrame = document.getElementById("finalText");
    const bottomFrame = document.querySelector(".bottom-frame");

    function typeFirst() {
      if (i < msg1.length) {
        document.getElementById("text").innerHTML += msg1.charAt(i);
        i++;
        setTimeout(typeFirst, 40);
      } else {
        setTimeout(typeSecond, 500);
      }
    }

    function typeSecond() {
      if (j < msg2.length) {
        document.getElementById("text2").innerHTML += msg2.charAt(j);
        j++;
        setTimeout(typeSecond, 40);
      } else {
        setTimeout(typeFinal, 500);
      }
    }

    function typeFinal() {
      if (k < msg3.length) {
        finalFrame.innerHTML += msg3.charAt(k);
        k++;
        bottomFrame.style.height = finalFrame.scrollHeight + 30 + "px";

        if (k === msg3.length) {
          finalFrame.style.fontSize = "28px";
          finalFrame.classList.add("glow");
        }

        setTimeout(typeFinal, 35);
      }
    }

    typeFirst();

    function goNextPage() {
      window.location.href = "goodbye.html"; 
    }
  </script>

</body>
</html>
